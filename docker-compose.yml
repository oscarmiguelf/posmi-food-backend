services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: posmi_food
      POSTGRES_USER: posmi
      POSTGRES_PASSWORD: posmi_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U posmi -d posmi_food']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
