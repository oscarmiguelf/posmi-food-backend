name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: posmi_food_test
          POSTGRES_USER: posmi
          POSTGRES_PASSWORD: posmi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://posmi:posmi_test@localhost:5432/posmi_food_test
        run: npx prisma generate

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://posmi:posmi_test@localhost:5432/posmi_food_test
        run: npx prisma migrate deploy

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://posmi:posmi_test@localhost:5432/posmi_food_test
          JWT_SECRET: test-secret
          NODE_ENV: test
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build
